<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinia — Painel da Clínica</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F5FAFF;font-family:Inter,system-ui,sans-serif;color:#0B2D48;min-height:100vh;}

/* HEADER */
.header{background:#0B2D48;color:#fff;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:Georgia,serif;font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;border-radius:50%;background:#5BC8FA;}
.clinic-name{font-size:13px;opacity:0.6;}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 56px);}
.sidebar{width:200px;background:#fff;border-right:1px solid #D8EAF8;padding:20px 0;flex-shrink:0;}
.nav-item{padding:10px 20px;font-size:14px;cursor:pointer;color:#4A6B85;display:flex;align-items:center;gap:8px;border-left:3px solid transparent;}
.nav-item:hover{background:#EAF6FF;color:#0B2D48;}
.nav-item.active{color:#2F8FE0;border-left-color:#2F8FE0;background:#EAF6FF;font-weight:500;}
.nav-icon{font-size:16px;}
.main{flex:1;padding:28px 32px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat{background:#fff;border:1px solid #D8EAF8;border-radius:12px;padding:16px 20px;}
.stat-n{font-family:Georgia,serif;font-size:28px;font-weight:500;color:#0B2D48;}
.stat-l{font-size:12px;color:#4A6B85;margin-top:2px;}
.stat.pending .stat-n{color:#D97706;}
.stat.approved .stat-n{color:#2F8FE0;}
.stat.completed .stat-n{color:#3FAE82;}
.stat.rejected .stat-n{color:#E8714A;}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #D8EAF8;}
.tab{padding:10px 20px;font-size:14px;cursor:pointer;color:#4A6B85;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab:hover{color:#0B2D48;}
.tab.active{color:#2F8FE0;border-bottom-color:#2F8FE0;font-weight:500;}

/* CARDS DE MARCAÇÃO */
.appt-list{display:flex;flex-direction:column;gap:12px;}
.appt-card{background:#fff;border:1px solid #D8EAF8;border-radius:12px;padding:18px 20px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;}
.appt-card.pending{border-left:4px solid #D97706;}
.appt-card.approved{border-left:4px solid #2F8FE0;}
.appt-card.rejected{border-left:4px solid #E8714A;opacity:0.7;}
.appt-card.completed{border-left:4px solid #3FAE82;opacity:0.7;}
.appt-card.no_show{border-left:4px solid #9CA3AF;opacity:0.6;}
.appt-info{}
.appt-patient{font-weight:500;font-size:15px;margin-bottom:4px;}
.appt-meta{font-size:13px;color:#4A6B85;display:flex;flex-wrap:wrap;gap:12px;margin-bottom:6px;}
.appt-reason{font-size:13px;color:#4A6B85;font-style:italic;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.badge.pending{background:#FEF3C7;color:#D97706;}
.badge.approved{background:#DBEAFE;color:#2F8FE0;}
.badge.rejected{background:#FEE2E2;color:#E8714A;}
.badge.completed{background:#D1FAE5;color:#3FAE82;}
.badge.confirmed{background:#DBEAFE;color:#1D4ED8;}
.badge.no_show{background:#F3F4F6;color:#6B7280;}
.badge.rescheduled{background:#EDE9FE;color:#7C3AED;}
.appt-actions{display:flex;flex-direction:column;gap:8px;min-width:140px;}
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;width:100%;text-align:center;}
.btn-approve{background:#2F8FE0;color:#fff;}
.btn-approve:hover{background:#1a7acc;}
.btn-reject{background:#FEE2E2;color:#E8714A;border:1px solid #FECACA;}
.btn-reject:hover{background:#FECACA;}
.btn-reschedule{background:#EDE9FE;color:#7C3AED;border:1px solid #DDD6FE;}
.btn-reschedule:hover{background:#DDD6FE;}
.btn-complete{background:#D1FAE5;color:#3FAE82;border:1px solid #A7F3D0;}
.btn-noshow{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:14px;padding:28px;width:420px;max-width:90vw;}
.modal h3{font-family:Georgia,serif;font-size:18px;margin-bottom:8px;}
.modal p{font-size:13px;color:#4A6B85;margin-bottom:18px;}
.modal input{width:100%;padding:9px 11px;border-radius:8px;border:1px solid #D8EAF8;font-size:14px;margin-bottom:8px;font-family:inherit;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.btn-primary{background:#2F8FE0;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;flex:1;}
.btn-ghost{background:transparent;color:#0B2D48;border:1px solid #D8EAF8;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;flex:1;}

.empty{text-align:center;padding:40px;color:#4A6B85;font-size:14px;}
.loading{text-align:center;padding:40px;color:#4A6B85;font-size:14px;}
.page-title{font-family:Georgia,serif;font-size:22px;margin-bottom:6px;}
.page-sub{font-size:13px;color:#4A6B85;margin-bottom:20px;}
.refresh-btn{background:transparent;border:1px solid #D8EAF8;padding:6px 14px;border-radius:8px;font-size:13px;color:#4A6B85;cursor:pointer;float:right;}
.refresh-btn:hover{background:#EAF6FF;}
.toast{position:fixed;bottom:24px;right:24px;background:#0B2D48;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:200;opacity:0;transition:opacity 0.3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="dot"></div>Clinia</div>
  <div class="clinic-name">Painel da Clínica</div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="nav-item active" onclick="setPage('marcacoes')"><span class="nav-icon">📋</span> Marcações</div>
    <div class="nav-item" onclick="setPage('medicos')"><span class="nav-icon">👨‍⚕️</span> Médicos</div>
    <div class="nav-item" onclick="setPage('pacientes')"><span class="nav-icon">👤</span> Pacientes</div>
  </div>
  <div class="main" id="main"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const client = createClient(
  "https://vvbrprbjhtvevwrknnyg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2YnJwcmJqaHR2ZXZ3cmtubnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTQ2MjMsImV4cCI6MjA5ODM5MDYyM30.BQi7sbuBxKmaXd6Pls_YeSEisQpMRmpS_1Vb0Z4ADD8"
);

let currentPage = 'marcacoes';
let currentTab = 'pending';
let appointments = [];
let doctors = [];
let loading = false;
let modal = null; // {type:'reject'|'reschedule', appt}

const STATUS_LABELS = {
  pending:'Pendente', approved:'Aprovada', rejected:'Rejeitada',
  rescheduled:'Remarcada', confirmed:'Confirmada',
  in_progress:'Em atendimento', completed:'Concluída', no_show:'Não compareceu'
};

const TABS = [
  {key:'pending', label:'Pendentes'},
  {key:'approved', label:'Aprovadas'},
  {key:'rescheduled', label:'Remarcadas'},
  {key:'completed', label:'Concluídas'},
  {key:'rejected', label:'Rejeitadas'},
];

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

async function loadAppointments(){
  loading = true; render();
  const {data, error} = await client
    .from('appointments')
    .select('*, doctors(name, specialty)')
    .order('requested_date', {ascending:true})
    .order('requested_time', {ascending:true});
  appointments = data || [];
  loading = false; render();
}

async function loadDoctors(){
  const {data} = await client.from('doctors').select('*').order('name');
  doctors = data || [];
  render();
}

async function updateStatus(id, status, extra={}){
  const {error} = await client
    .from('appointments')
    .update({status, ...extra})
    .eq('id', id);
  if(error){ showToast('Erro: '+error.message); return; }
  showToast(status === 'approved' ? '✓ Marcação aprovada' :
            status === 'rejected' ? 'Marcação rejeitada' :
            status === 'rescheduled' ? 'Novo horário sugerido' :
            status === 'completed' ? '✓ Consulta concluída' :
            'Estado actualizado');
  modal = null;
  await loadAppointments();
}

function setPage(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if(page==='marcacoes') loadAppointments();
  if(page==='medicos') loadDoctors();
  render();
}

function setTab(tab){
  currentTab = tab;
  render();
}

function renderModal(){
  if(!modal) return '';
  const div = document.createElement('div');
  div.className = 'overlay';

  const box = document.createElement('div');
  box.className = 'modal';

  if(modal.type === 'reject'){
    box.innerHTML = `<h3>Rejeitar marcação</h3><p>Tens a certeza que queres rejeitar o pedido de <strong>${modal.appt.patient_name}</strong> para ${modal.appt.requested_date} às ${modal.appt.requested_time.slice(0,5)}?</p>`;
    const actions = document.createElement('div'); actions.className='modal-actions';
    const cancel = document.createElement('button'); cancel.className='btn-ghost'; cancel.textContent='Cancelar';
    cancel.onclick=()=>{modal=null;render();};
    const confirm = document.createElement('button'); confirm.className='btn-primary'; confirm.style.background='#E8714A'; confirm.textContent='Rejeitar';
    confirm.onclick=()=>updateStatus(modal.appt.id,'rejected');
    actions.appendChild(cancel); actions.appendChild(confirm);
    box.appendChild(actions);
  }

  if(modal.type === 'reschedule'){
    box.innerHTML = `<h3>Sugerir novo horário</h3><p>Sugere uma data e hora alternativa para <strong>${modal.appt.patient_name}</strong>.</p>`;
    const dateLabel = document.createElement('label'); dateLabel.style.cssText='font-size:12px;color:#4A6B85;display:block;margin-bottom:4px;'; dateLabel.textContent='Nova data';
    const dateInput = document.createElement('input'); dateInput.type='date'; dateInput.id='sugg_date'; dateInput.min=new Date().toISOString().slice(0,10);
    const timeLabel = document.createElement('label'); timeLabel.style.cssText='font-size:12px;color:#4A6B85;display:block;margin-bottom:4px;margin-top:8px;'; timeLabel.textContent='Nova hora';
    const timeInput = document.createElement('input'); timeInput.type='time'; timeInput.id='sugg_time';
    box.appendChild(dateLabel); box.appendChild(dateInput);
    box.appendChild(timeLabel); box.appendChild(timeInput);
    const actions = document.createElement('div'); actions.className='modal-actions';
    const cancel = document.createElement('button'); cancel.className='btn-ghost'; cancel.textContent='Cancelar';
    cancel.onclick=()=>{modal=null;render();};
    const confirm = document.createElement('button'); confirm.className='btn-primary'; confirm.textContent='Enviar sugestão';
    confirm.onclick=()=>{
      const d=document.getElementById('sugg_date').value;
      const t=document.getElementById('sugg_time').value;
      if(!d||!t){showToast('Preenche a data e hora.');return;}
      updateStatus(modal.appt.id,'rescheduled',{suggested_date:d, suggested_time:t+':00'});
    };
    actions.appendChild(cancel); actions.appendChild(confirm);
    box.appendChild(actions);
  }

  div.appendChild(box);
  div.onclick=(e)=>{ if(e.target===div){modal=null;render();} };
  return div;
}

function renderMarcacoes(){
  const container = document.createElement('div');

  // Título + botão refresh
  const titleRow = document.createElement('div');
  const title = document.createElement('div'); title.className='page-title'; title.textContent='Marcações';
  const refreshBtn = document.createElement('button'); refreshBtn.className='refresh-btn'; refreshBtn.textContent='↻ Actualizar';
  refreshBtn.onclick=loadAppointments;
  titleRow.appendChild(title); titleRow.appendChild(refreshBtn);
  const sub = document.createElement('div'); sub.className='page-sub'; sub.textContent='Gere os pedidos de consulta da tua clínica.';
  container.appendChild(titleRow); container.appendChild(sub);

  // Stats
  const stats = document.createElement('div'); stats.className='stats';
  const counts = {pending:0, approved:0, completed:0, rejected:0};
  appointments.forEach(a=>{ if(counts[a.status]!==undefined) counts[a.status]++; });
  [
    {key:'pending', label:'Pendentes', cls:'pending'},
    {key:'approved', label:'Aprovadas', cls:'approved'},
    {key:'completed', label:'Concluídas', cls:'completed'},
    {key:'rejected', label:'Rejeitadas', cls:'rejected'},
  ].forEach(s=>{
    const card=document.createElement('div'); card.className='stat '+s.cls;
    card.innerHTML=`<div class="stat-n">${counts[s.key]}</div><div class="stat-l">${s.label}</div>`;
    card.style.cursor='pointer';
    card.onclick=()=>setTab(s.key);
    stats.appendChild(card);
  });
  container.appendChild(stats);

  // Tabs
  const tabsEl = document.createElement('div'); tabsEl.className='tabs';
  TABS.forEach(t=>{
    const tab=document.createElement('div');
    tab.className='tab'+(currentTab===t.key?' active':'');
    const cnt=appointments.filter(a=>a.status===t.key).length;
    tab.textContent=t.label+(cnt>0?` (${cnt})`:'');
    tab.onclick=()=>setTab(t.key);
    tabsEl.appendChild(tab);
  });
  container.appendChild(tabsEl);

  if(loading){ const l=document.createElement('div'); l.className='loading'; l.textContent='A carregar...'; container.appendChild(l); return container; }

  // Lista
  const filtered = appointments.filter(a=>a.status===currentTab);
  const list = document.createElement('div'); list.className='appt-list';

  if(filtered.length===0){
    const empty=document.createElement('div'); empty.className='empty';
    empty.textContent='Sem marcações neste estado.';
    list.appendChild(empty);
  } else {
    filtered.forEach(appt=>{
      const card=document.createElement('div');
      card.className='appt-card '+appt.status;

      const info=document.createElement('div'); info.className='appt-info';
      const patient=document.createElement('div'); patient.className='appt-patient';
      patient.textContent=appt.patient_name;
      const badge=document.createElement('span'); badge.className='badge '+appt.status;
      badge.textContent=STATUS_LABELS[appt.status]||appt.status;
      patient.appendChild(document.createTextNode(' ')); patient.appendChild(badge);

      const meta=document.createElement('div'); meta.className='appt-meta';
      meta.innerHTML=`<span>📅 ${appt.requested_date}</span><span>🕐 ${appt.requested_time.slice(0,5)}</span><span>👨‍⚕️ ${appt.doctors?.name||'—'}</span><span>📞 ${appt.patient_phone}</span>`;

      const reason=document.createElement('div'); reason.className='appt-reason';
      if(appt.reason) reason.textContent='"'+appt.reason+'"';

      if(appt.suggested_date){
        const sugg=document.createElement('div'); sugg.style.cssText='font-size:12px;color:#7C3AED;margin-top:6px;';
        sugg.textContent=`↪ Novo horário sugerido: ${appt.suggested_date} às ${(appt.suggested_time||'').slice(0,5)}`;
        info.appendChild(sugg);
      }

      info.appendChild(patient); info.appendChild(meta); info.appendChild(reason);

      // Acções
      const actions=document.createElement('div'); actions.className='appt-actions';

      if(appt.status==='pending'){
        const approve=document.createElement('button'); approve.className='btn btn-approve'; approve.textContent='✓ Aprovar';
        approve.onclick=()=>updateStatus(appt.id,'approved');
        const reschedule=document.createElement('button'); reschedule.className='btn btn-reschedule'; reschedule.textContent='↪ Sugerir horário';
        reschedule.onclick=()=>{modal={type:'reschedule',appt};render();};
        const reject=document.createElement('button'); reject.className='btn btn-reject'; reject.textContent='✕ Rejeitar';
        reject.onclick=()=>{modal={type:'reject',appt};render();};
        actions.appendChild(approve); actions.appendChild(reschedule); actions.appendChild(reject);
      }

      if(appt.status==='approved'){
        const complete=document.createElement('button'); complete.className='btn btn-complete'; complete.textContent='✓ Concluída';
        complete.onclick=()=>updateStatus(appt.id,'completed');
        const noshow=document.createElement('button'); noshow.className='btn btn-noshow'; noshow.textContent='✕ Não compareceu';
        noshow.onclick=()=>updateStatus(appt.id,'no_show');
        actions.appendChild(complete); actions.appendChild(noshow);
      }

      card.appendChild(info); card.appendChild(actions);
      list.appendChild(card);
    });
  }
  container.appendChild(list);
  return container;
}

function renderMedicos(){
  const container=document.createElement('div');
  const title=document.createElement('div'); title.className='page-title'; title.textContent='Médicos';
  const sub=document.createElement('div'); sub.className='page-sub'; sub.textContent='Lista de médicos registados na clínica.';
  container.appendChild(title); container.appendChild(sub);
  if(doctors.length===0){
    const e=document.createElement('div'); e.className='empty'; e.textContent='Nenhum médico registado.';
    container.appendChild(e);
  } else {
    const list=document.createElement('div'); list.className='appt-list';
    doctors.forEach(d=>{
      const card=document.createElement('div'); card.className='appt-card';
      card.style.gridTemplateColumns='1fr';
      card.innerHTML=`<div class="appt-patient">${d.name} <span class="badge approved">${d.active?'Activo':'Inactivo'}</span></div><div class="appt-meta"><span>🩺 ${d.specialty||'Sem especialidade'}</span></div>`;
      list.appendChild(card);
    });
    container.appendChild(list);
  }
  return container;
}

function renderPacientes(){
  const container=document.createElement('div');
  const title=document.createElement('div'); title.className='page-title'; title.textContent='Pacientes';
  const sub=document.createElement('div'); sub.className='page-sub'; sub.textContent='Todos os pacientes que fizeram pedidos de marcação.';
  container.appendChild(title); container.appendChild(sub);
  const unique=[];
  const seen=new Set();
  appointments.forEach(a=>{ if(!seen.has(a.patient_phone)){seen.add(a.patient_phone);unique.push(a);} });
  if(unique.length===0){
    const e=document.createElement('div'); e.className='empty'; e.textContent='Nenhum paciente ainda.';
    container.appendChild(e);
  } else {
    const list=document.createElement('div'); list.className='appt-list';
    unique.forEach(a=>{
      const total=appointments.filter(x=>x.patient_phone===a.patient_phone).length;
      const card=document.createElement('div'); card.className='appt-card'; card.style.gridTemplateColumns='1fr';
      card.innerHTML=`<div class="appt-patient">${a.patient_name}</div><div class="appt-meta"><span>📞 ${a.patient_phone}</span><span>📋 ${total} marcação(ões)</span></div>`;
      list.appendChild(card);
    });
    container.appendChild(list);
  }
  return container;
}

function render(){
  const main=document.getElementById('main');
  main.innerHTML='';
  if(currentPage==='marcacoes') main.appendChild(renderMarcacoes());
  if(currentPage==='medicos') main.appendChild(renderMedicos());
  if(currentPage==='pacientes') main.appendChild(renderPacientes());
  if(modal) main.appendChild(renderModal());
}

// Iniciar
loadAppointments();
</script>
</body>
</html>
